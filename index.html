const API_URL = 'https://script.google.com/macros/s/AKfycbwrHpawvVRPCB2ySic6poT5-cbYBj-RWZd6JO5ZpCZ9IehifO02LsQfx1LgeK0yvvTDFg/exec';

const { useState, useEffect, useRef, useCallback } = React;

async function api(fn, ...args) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ fn, args })
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || 'Server error');
  return json.data;
}

/* ---------- handwritten photo upload helpers ---------- */
function readAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error('Could not read the file.'));
    r.readAsDataURL(file);
  });
}

// Images are resized/compressed in the browser before upload; PDFs are sent as-is (max 8 MB)
async function prepareUpload(file) {
  if (file.type === 'application/pdf') {
    if (file.size > 8 * 1024 * 1024) throw new Error('This PDF is too large (max 8 MB). Please upload a photo (JPG) instead.');
    const dataUri = await readAsDataURL(file);
    return { base64: dataUri.split(',')[1], mime: 'application/pdf' };
  }
  const dataUri = await readAsDataURL(file);
  try {
    const img = await new Promise((resolve, reject) => {
      const i = new Image();
      i.onload = () => resolve(i);
      i.onerror = () => reject(new Error('img'));
      i.src = dataUri;
    });
    const maxDim = 1800;
    const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
    const canvas = document.createElement('canvas');
    canvas.width = Math.round(img.width * scale);
    canvas.height = Math.round(img.height * scale);
    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
    const out = canvas.toDataURL('image/jpeg', 0.85);
    return { base64: out.split(',')[1], mime: 'image/jpeg' };
  } catch (e) {
    // fallback: browser couldn't decode the image (rare formats) → upload as-is
    if (file.size > 8 * 1024 * 1024) throw new Error('This file is too large (max 8 MB).');
    return { base64: dataUri.split(',')[1], mime: file.type || 'image/jpeg' };
  }
}

function base64ToBlobUrl(base64, mime) {
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([bytes], { type: mime }));
}

/* ---------- stages ---------- */
const STEPS = [
  { key: 'draft',   label: '① Draft' },
  { key: 'english', label: '② English Check' },
  { key: 'deepl',   label: '③ DeepL Check' },
  { key: 'chat',    label: '④ Torai-kun Chat' },
  { key: 'final',   label: '⑤ Final Draft' }
];
// Values written to the teacher's progress sheet (kept in Japanese per spec)
const STAGE_SHEET = { draft: '原稿入力', english: '英語チェック', deepl: 'DeepL照合', chat: 'Geminiチャット', final: 'Geminiチャット', done: '完了' };
// English labels shown to students for those sheet values
const STAGE_LABEL_EN = {
  '原稿入力': 'Draft', '英語チェック': 'English Check', 'DeepL照合': 'DeepL Check',
  'Geminiチャット': 'Torai-kun Chat', '完了': 'Done'
};
const STAGE_BADGE = {
  '原稿入力': 'bg-gray-200 text-gray-700', '英語チェック': 'bg-yellow-200 text-yellow-800',
  'DeepL照合': 'bg-stone-200 text-stone-700', 'Geminiチャット': 'bg-terra-200 text-terra-800',
  '完了': 'bg-green-200 text-green-800'
};

function emptyState() {
  return {
    stage: 'draft', draft: '', handwritten: null,
    englishText: '', englishItems: [], englishChat: [],
    deeplText: '', deeplEn: '', deeplChat: [], ref1a: '', ref1b: '',
    chat: [], chatDraft: '', finalText: '', ref2a: '', ref2b: ''
  };
}

/* ---------- small parts ---------- */
function Spinner({ text }) {
  return (
    <span className="inline-flex items-center gap-2 text-terra-600">
      <span className="animate-spin inline-block w-4 h-4 border-2 border-terra-500 border-t-transparent rounded-full"></span>
      {text || 'Processing...'}
    </span>
  );
}

function ErrorBanner({ msg, onClose }) {
  if (!msg) return null;
  return (
    <div className="bg-red-100 border border-red-300 text-red-800 rounded-lg px-4 py-2 mb-4 flex justify-between items-center text-sm">
      <span>⚠️ {msg}</span>
      <button onClick={onClose} className="ml-4 font-bold">×</button>
    </div>
  );
}

// step key → docType (for linking each chip to its Google Doc)
const STEP_DOC = { draft: 'original', english: 'english', deepl: 'deepl', chat: 'chat', final: 'final' };

function Stepper({ stage, docLinks }) {
  const idx = stage === 'done' ? STEPS.length : STEPS.findIndex(s => s.key === stage);
  return (
    <div className="flex flex-wrap gap-1 mb-5">
      {STEPS.map((s, i) => {
        const cls = 'px-3 py-1 rounded-full text-xs font-bold ' +
          (i < idx ? 'bg-green-500 text-white' : i === idx ? 'bg-terra-500 text-white' : 'bg-gray-200 text-gray-500');
        const url = docLinks && docLinks[STEP_DOC[s.key]];
        const label = (i < idx ? '✓ ' : '') + s.label;
        return url ? (
          <a key={s.key} href={url} target="_blank" rel="noopener"
            title="Open this stage's Google Doc"
            className={cls + ' hover:opacity-80 cursor-pointer'}>{label} ↗</a>
        ) : (
          <div key={s.key} className={cls}>{label}</div>
        );
      })}
    </div>
  );
}

/* Simple renderer for Torai-kun's replies (**bold**, > quotes, line breaks) */
function renderChatText(text) {
  const lines = String(text).split('\n');
  return lines.map((line, i) => {
    const isQuote = /^\s*>\s?/.test(line);
    const clean = line.replace(/^\s*>\s?/, '');
    const parts = clean.split(/(\*\*[^*]+\*\*)/g).map((p, j) =>
      /^\*\*[^*]+\*\*$/.test(p) ? <strong key={j}>{p.slice(2, -2)}</strong> : p
    );
    return isQuote
      ? <blockquote key={i}>{parts}</blockquote>
      : <div key={i} className="min-h-[0.5em]">{parts}</div>;
  });
}

/* ================================================================ */
function App() {
  const [auth, setAuth] = useState(() => {
    try { return JSON.parse(localStorage.getItem('wh_auth')) || null; } catch (e) { return null; }
  });
  const [view, setView] = useState('login'); // login | menu | work
  const [dnum, setDnum] = useState(null);
  const [dtitle, setDtitle] = useState('');
  const [error, setError] = useState('');

  useEffect(() => { if (auth) setView('menu'); }, []);

  const logout = () => {
    localStorage.removeItem('wh_auth');
    setAuth(null); setView('login'); setDnum(null);
  };

  return (
    <div className="max-w-5xl mx-auto px-4 py-6">
      <header className="flex justify-between items-center mb-6">
        <h1 className="text-2xl font-bold text-terra-700">🐯 Write-Up Gym</h1>
        {auth && (
          <div className="text-sm text-gray-600 flex items-center gap-3">
            <span>👤 {auth.name}</span>
            {view === 'work' && <button onClick={() => { setView('menu'); setDnum(null); }} className="text-terra-600 underline">D# Menu</button>}
            <button onClick={logout} className="text-gray-400 underline">Log out</button>
          </div>
        )}
      </header>
      <ErrorBanner msg={error} onClose={() => setError('')} />
      {view === 'login' && <LoginView onLogin={(a) => { setAuth(a); setView('menu'); }} setError={setError} />}
      {view === 'menu' && auth && <MenuView auth={auth} onSelect={(n, t) => { setDnum(n); setDtitle(t || ''); setView('work'); }} setError={setError} />}
      {view === 'work' && auth && dnum && <WorkView auth={auth} dnum={dnum} dtitle={dtitle} setError={setError} onExit={() => { setView('menu'); setDnum(null); }} />}
    </div>
  );
}

/* ---------- Login (with first-time PIN setup and self-service reset) ---------- */
function LoginView({ onLogin, setError }) {
  const [students, setStudents] = useState([]);
  const [mode, setMode] = useState('login'); // login | setpin | forgot
  const [name, setName] = useState('');
  const [pin, setPin] = useState('');
  const [pin2, setPin2] = useState('');
  const [jname, setJname] = useState('');
  const [code, setCode] = useState('');
  const [codeSent, setCodeSent] = useState(false);
  const [maskedEmail, setMaskedEmail] = useState('');
  const [busy, setBusy] = useState(false);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    api('getBootstrap')
      .then(d => { setStudents(d.students); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  const switchMode = (m) => {
    setMode(m); setError('');
    setPin(''); setPin2(''); setCode(''); setCodeSent(false); setMaskedEmail('');
  };

  const finishLogin = async (p) => {
    await api('studentLogin', name, p);
    const a = { name, pin: p };
    localStorage.setItem('wh_auth', JSON.stringify(a));
    onLogin(a);
  };

  const run = async (fn) => {
    setBusy(true); setError('');
    try { await fn(); } catch (e) { setError(e.message); }
    setBusy(false);
  };

  const doLogin = () => run(() => finishLogin(pin));
  const doSetPin = () => run(async () => { await api('setPin', name, pin, pin2, jname); await finishLogin(pin); });
  const doSendCode = () => run(async () => {
    const d = await api('requestPinReset', name);
    setCodeSent(true); setMaskedEmail(d.maskedEmail || '');
  });
  const doReset = () => run(async () => { await api('resetPin', name, code, pin, pin2); await finishLogin(pin); });

  const nameSelect = (
    <div>
      <label className="block text-sm font-bold text-gray-600 mb-1">Name</label>
      <select value={name} onChange={e => setName(e.target.value)} className="w-full border rounded-lg p-2">
        <option value="">Select your name</option>
        {students.map(s => <option key={s} value={s}>{s}</option>)}
      </select>
    </div>
  );
  const pinField = (label, val, setVal, ph) => (
    <div>
      <label className="block text-sm font-bold text-gray-600 mb-1">{label}</label>
      <input type="password" value={val} onChange={e => setVal(e.target.value)}
        className="w-full border rounded-lg p-2" placeholder={ph} />
    </div>
  );

  return (
    <div className="bg-white rounded-2xl shadow p-8 max-w-md mx-auto mt-10">
      <h2 className="text-lg font-bold mb-4">
        {mode === 'login' ? 'Login' : mode === 'setpin' ? 'Set your PIN (first time)' : 'Reset your PIN'}
      </h2>
      {loading ? <Spinner text="Loading..." /> : (
        <div className="space-y-4">
          {nameSelect}

          {mode === 'login' && (
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-bold text-gray-600 mb-1">PIN</label>
                <input type="password" value={pin} onChange={e => setPin(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && name && pin && doLogin()}
                  className="w-full border rounded-lg p-2" placeholder="Your PIN" />
              </div>
              <button onClick={doLogin} disabled={!name || !pin || busy}
                className="w-full bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold py-2 rounded-lg">
                {busy ? 'Checking...' : 'Login'}
              </button>
              <div className="flex justify-between text-sm">
                <button onClick={() => switchMode('setpin')} className="text-terra-600 underline">First time? Set your PIN</button>
                <button onClick={() => switchMode('forgot')} className="text-gray-400 underline">Forgot your PIN?</button>
              </div>
            </div>
          )}

          {mode === 'setpin' && (
            <div className="space-y-4">
              <p className="text-xs text-gray-500">Choose your own PIN (at least 4 characters) and enter it twice. You'll use it every time you log in.</p>
              {pinField('New PIN', pin, setPin, 'At least 4 characters')}
              {pinField('Confirm new PIN', pin2, setPin2, 'Type it again')}
              <div>
                <label className="block text-sm font-bold text-gray-600 mb-1">Your name in Japanese <span className="font-normal text-gray-400">(what Torai-kun 🐯 will call you)</span></label>
                <input value={jname} onChange={e => setJname(e.target.value)}
                  className="w-full border rounded-lg p-2" placeholder="e.g. ジェイク / さくら" />
              </div>
              <button onClick={doSetPin} disabled={!name || !pin || !pin2 || !jname.trim() || busy}
                className="w-full bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold py-2 rounded-lg">
                {busy ? 'Saving...' : 'Set PIN & log in'}
              </button>
              <div className="text-sm text-center">
                <button onClick={() => switchMode('login')} className="text-gray-400 underline">← Back to login</button>
              </div>
            </div>
          )}

          {mode === 'forgot' && (
            <div className="space-y-4">
              {!codeSent ? (
                <div className="space-y-4">
                  <p className="text-xs text-gray-500">We'll email a 6-digit reset code to the address your teacher has on file for you.</p>
                  <button onClick={doSendCode} disabled={!name || busy}
                    className="w-full bg-[#3D405B] hover:bg-[#2F3247] disabled:bg-gray-300 text-white font-bold py-2 rounded-lg">
                    {busy ? 'Sending...' : '📧 Email me a reset code'}
                  </button>
                </div>
              ) : (
                <div className="space-y-4">
                  <p className="text-xs text-green-700 font-bold">✓ Code sent to {maskedEmail}. It's valid for 30 minutes.</p>
                  <div>
                    <label className="block text-sm font-bold text-gray-600 mb-1">Reset code</label>
                    <input value={code} onChange={e => setCode(e.target.value)}
                      className="w-full border rounded-lg p-2 tracking-widest" placeholder="6-digit code" />
                  </div>
                  {pinField('New PIN', pin, setPin, 'At least 4 characters')}
                  {pinField('Confirm new PIN', pin2, setPin2, 'Type it again')}
                  <button onClick={doReset} disabled={!name || !code || !pin || !pin2 || busy}
                    className="w-full bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold py-2 rounded-lg">
                    {busy ? 'Resetting...' : 'Reset PIN & log in'}
                  </button>
                  <div className="text-xs text-center">
                    <button onClick={doSendCode} disabled={busy} className="text-terra-600 underline">Send a new code</button>
                  </div>
                </div>
              )}
              <div className="text-sm text-center">
                <button onClick={() => switchMode('login')} className="text-gray-400 underline">← Back to login</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- D# menu ---------- */
function MenuView({ auth, onSelect, setError }) {
  const [progress, setProgress] = useState(null);

  useEffect(() => {
    api('getProgress', { name: auth.name, pin: auth.pin })
      .then(setProgress)
      .catch(e => setError(e.message));
  }, []);

  if (!progress) return <div className="text-center mt-16"><Spinner text="Loading your progress..." /></div>;

  return (
    <div className="bg-white rounded-2xl shadow p-8">
      <h2 className="text-lg font-bold mb-1">Choose an assignment</h2>
      <p className="text-sm text-gray-500 mb-5">Select an in-progress D# to resume where you left off, or a new one to start.</p>
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        {Array.from({ length: progress.numDs }, (_, i) => i + 1).map(n => {
          const info = progress.items['D' + n];
          const title = (progress.titles || {})[n];
          return (
            <button key={n} onClick={() => onSelect(n, title)}
              className="border-2 border-terra-200 hover:border-terra-500 rounded-xl p-4 text-left bg-terra-50 hover:bg-terra-100">
              <div className="text-xl font-bold text-terra-700">D{n}</div>
              {title && <div className="text-xs text-gray-600 font-bold mt-0.5">{title}</div>}
              {info ? (
                <div>
                  <span className={'inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-bold ' + (STAGE_BADGE[info.stage] || 'bg-gray-200')}>
                    {STAGE_LABEL_EN[info.stage] || info.stage}
                  </span>
                  {info.reviewed && <div className="text-xs text-green-700 font-bold mt-1">✅ Reviewed by your teacher</div>}
                </div>
              ) : <span className="inline-block mt-1 text-xs text-gray-400">Not started</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Work view (all steps) ---------- */
function WorkView({ auth, dnum, dtitle, setError, onExit }) {
  const [st, setSt] = useState(null);     // working state
  const [busy, setBusy] = useState('');   // '' | 'save' | 'check' | 'deepl' | 'chat' | 'doc'
  const [docLinks, setDocLinks] = useState({}); // docType → Google Doc URL
  const stRef = useRef(null);
  stRef.current = st;

  // load saved state (resume) + links to this D#'s Google Docs
  useEffect(() => {
    api('getState', { name: auth.name, pin: auth.pin, dnum })
      .then(d => {
        setSt(d.state ? Object.assign(emptyState(), d.state) : emptyState());
        setDocLinks(d.docLinks || {});
      })
      .catch(e => { setError(e.message); setSt(emptyState()); });
  }, [dnum]);

  const up = (patch) => setSt(s => Object.assign({}, s, patch));

  // save state (also updates CurrentStage on the progress sheet)
  const persist = useCallback(async (state) => {
    const s = state || stRef.current;
    await api('saveState', { name: auth.name, pin: auth.pin, dnum, state: s, stage: STAGE_SHEET[s.stage] });
  }, [dnum]);

  const manualSave = async () => {
    setBusy('save'); setError('');
    try { await persist(); } catch (e) { setError(e.message); }
    setBusy('');
  };

  // save a Google Doc + move to the next step
  const advance = async (docType, content, nextStage, extraPatch) => {
    setBusy('doc'); setError('');
    try {
      const next = Object.assign({}, stRef.current, extraPatch || {}, { stage: nextStage });
      const r = await api('saveDoc', {
        name: auth.name, pin: auth.pin, dnum, docType,
        content, stage: STAGE_SHEET[nextStage]
      });
      await api('saveState', { name: auth.name, pin: auth.pin, dnum, state: next, stage: STAGE_SHEET[nextStage] });
      if (r && r.url) setDocLinks(dl => Object.assign({}, dl, { [docType]: r.url }));
      if (r && r.copyUrl) setDocLinks(dl => Object.assign({}, dl, { finalcopy: r.copyUrl }));
      setSt(next);
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  if (!st) return <div className="text-center mt-16"><Spinner text="Loading..." /></div>;

  const SaveBtn = () => (
    <button onClick={manualSave} disabled={!!busy}
      className="text-sm text-gray-500 border rounded-lg px-3 py-1 hover:bg-gray-50">
      {busy === 'save' ? 'Saving...' : '💾 Save progress'}
    </button>
  );

  return (
    <div className="bg-white rounded-2xl shadow p-6 sm:p-8">
      <div className="flex justify-between items-start">
        <h2 className="text-xl font-bold text-gray-700 mb-2">D{dnum}{dtitle && <span className="text-base font-normal text-gray-500"> — {dtitle}</span>}</h2>
        {st.stage !== 'done' && <SaveBtn />}
      </div>
      <Stepper stage={st.stage} docLinks={docLinks} />

      {st.stage === 'draft' && <DraftStep st={st} up={up} busy={busy} setBusy={setBusy} advance={advance} auth={auth} dnum={dnum} setError={setError} />}
      {st.stage === 'english' && <EnglishStep st={st} up={up} busy={busy} setBusy={setBusy} advance={advance} auth={auth} setError={setError} persist={persist} />}
      {st.stage === 'deepl' && <DeepLStep st={st} up={up} busy={busy} setBusy={setBusy} advance={advance} auth={auth} setError={setError} persist={persist} />}
      {st.stage === 'chat' && <ChatStep st={st} up={up} busy={busy} setBusy={setBusy} advance={advance} auth={auth} dnum={dnum} setError={setError} persist={persist} />}
      {st.stage === 'final' && <FinalStep st={st} up={up} busy={busy} advance={advance} />}
      {st.stage === 'done' && <DoneStep onExit={onExit} docLinks={docLinks} />}
    </div>
  );
}

/* ---------- ① Draft (handwritten photo left / typing right) ---------- */
function DraftStep({ st, up, busy, setBusy, advance, auth, dnum, setError }) {
  const [preview, setPreview] = useState(null); // { src, mime }
  const fileRef = useRef(null);

  // load the saved handwritten photo (uploaded earlier, e.g. from the phone)
  useEffect(() => {
    if (st.handwritten && !preview) {
      api('getHandwritten', { name: auth.name, pin: auth.pin, dnum })
        .then(d => {
          if (d.base64) setPreview({ src: base64ToBlobUrl(d.base64, d.mime), mime: d.mime });
        })
        .catch(() => {});
    }
  }, []);

  const handleFile = async (file) => {
    if (!file) return;
    setBusy('upload'); setError('');
    try {
      const p = await prepareUpload(file);
      const d = await api('uploadHandwritten', { name: auth.name, pin: auth.pin, dnum, base64: p.base64, mime: p.mime });
      up({ handwritten: d.handwritten });
      setPreview({ src: base64ToBlobUrl(p.base64, p.mime), mime: p.mime });
    } catch (e) { setError(e.message); }
    setBusy('');
    if (fileRef.current) fileRef.current.value = '';
  };

  const uploadBtn = (label) => (

        <span className="text-terra-600">📱 Tip: you can open this same page on your phone, log in, choose this D#, and upload the photo there — it will be waiting here on your computer.</span></p>

      <div className="grid lg:grid-cols-2 gap-4">
        {/* left: handwritten photo */}

            <div className="h-96 border-2 border-gray-200 rounded-xl flex items-center justify-center"><Spinner text="Loading your photo..." /></div>
          ) : (
            <div className="h-96 border-2 border-dashed border-terra-300 rounded-xl bg-terra-50/50 flex flex-col items-center justify-center gap-3 text-center p-6">
              <div className="text-4xl">📷</div>
              <div className="text-sm text-gray-500">Upload a photo (JPG) or PDF of your handwritten draft.<br />It will be saved in your D{dnum} folder.</div>

        {/* right: typed draft */}

          <div className="text-xs font-bold text-gray-500 mb-1">Typed draft</div>

            placeholder="Type your draft here..." />

          onClick={() => advance('original', st.draft, 'english', { englishText: st.draft })}

/* ---------- ② English Check ---------- */
function EnglishStep({ st, up, busy, setBusy, advance, auth, setError, persist }) {
  const [vInput, setVInput] = useState('');
  const vListRef = useRef(null);
  const vLastRef = useRef(null);

  // show the TOP of the newest message (so long replies start from the beginning)
  useEffect(() => {
    const c = vListRef.current, m = vLastRef.current;
    if (c && m) c.scrollTop = Math.max(0, m.offsetTop - 8);
  }, [(st.englishChat || []).length]);

  // context for Torai-kun: the detected items and their suggestions
  const itemsText = st.englishItems.map(it => {
    const sugs = (it.suggestions || []).map(s => (typeof s === 'string') ? s : s.jp).join(' / ');
    return '"' + it.english + '" → ' + sugs;
  }).join('\n');

  const sendVocab = async () => {
    const t = vInput.trim();
    if (!t || busy) return;
    setVInput('');
    setBusy('vchat'); setError('');
    const history = [...(st.englishChat || []), { role: 'user', text: t }];
    up({ englishChat: history });
    try {
      const d = await api('vocabChat', {
        name: auth.name, pin: auth.pin, history,
        draft: st.englishText, itemsText
      });
      const newChat = [...history, { role: 'assistant', text: d.text }];
      up({ englishChat: newChat });
      persist(Object.assign({}, st, { englishChat: newChat })).catch(() => {});
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  const runCheck = async () => {
    setBusy('check'); setError('');
    try {
      const d = await api('checkEnglish', { name: auth.name, pin: auth.pin, text: st.englishText });
      if (d.safetyBlocked) { setError('The check was blocked. Please review your text and try again.'); }
      // Safety net: only keep items that actually contain Latin letters (never katakana)
      const items = (d.items || []).filter(it => /[A-Za-z]/.test(String(it.english)));
      up({ englishItems: items.map(it => Object.assign({ resolved: false, own: '' }, it)) });
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  const setItem = (idx, patch) => {
    up({ englishItems: st.englishItems.map((x, i) => i === idx ? Object.assign({}, x, patch) : x) });
  };

  const applyReplace = (idx, replacement) => {
    const item = st.englishItems[idx];
    let text = st.englishText;
    if (text.includes(item.english)) {
      text = text.replace(item.english, replacement);
    }
    up({
      englishText: text,
      englishItems: st.englishItems.map((it, i) => i === idx
        ? Object.assign({}, it, { resolved: true, chosen: replacement, applied: true }) : it)
    });
  };

  const skip = (idx) => setItem(idx, { resolved: true, chosen: '(kept as is)', applied: false });

  // Undo: put the original English back and reopen the item
  const undo = (idx) => {
    const item = st.englishItems[idx];
    let text = st.englishText;
    if (item.applied && item.chosen && text.includes(item.chosen)) {
      text = text.replace(item.chosen, item.english);
    }
    up({
      englishText: text,
      englishItems: st.englishItems.map((it, i) => i === idx
        ? Object.assign({}, it, { resolved: false, chosen: undefined, applied: false }) : it)
    });
  };

  const unresolved = st.englishItems.filter(it => !it.resolved).length;

  return (
    <div>
      <h3 className="font-bold mb-1">Replace the English parts with Japanese</h3>
      <p className="text-sm text-gray-500 mb-3">Press "Check English" to find the English parts, each with 3 suggested replacements. Pick one, or type your own. You can also edit the text below directly at any time. (Katakana words are left as they are.)</p>
      <textarea value={st.englishText} onChange={e => up({ englishText: e.target.value })}
        rows={10} className="w-full border-2 border-gray-200 rounded-xl p-4 focus:border-terra-400 outline-none" />
      <div className="mt-3 flex gap-3 items-center">
        <button onClick={runCheck} disabled={!!busy || !st.englishText.trim()}
          className="bg-yellow-500 hover:bg-yellow-600 disabled:bg-gray-300 text-white font-bold px-5 py-2 rounded-lg">
          {busy === 'check' ? <Spinner text="Checking..." /> : '🔍 Check English'}
        </button>
        {st.englishItems.length > 0 && unresolved === 0 &&
          <span className="text-green-600 text-sm font-bold">✓ All items resolved</span>}
      </div>

      {st.englishItems.length > 0 && (
        <div className="mt-4 space-y-3">
          {st.englishItems.map((it, idx) => (
            <div key={idx} className={'border rounded-xl p-4 ' + (it.resolved ? 'bg-green-50 border-green-200' : 'bg-yellow-50 border-yellow-300')}>
              <div className="flex justify-between items-start">
                <div className="font-bold text-red-600">"{it.english}"</div>
                {it.resolved && (
                  <span className="text-xs text-green-700 font-bold flex items-center gap-2">
                    ✓ {it.chosen}
                    <button onClick={() => undo(idx)} className="text-gray-400 underline font-normal">Undo</button>
                  </span>
                )}
              </div>
              {it.note && <div className="text-xs text-gray-500 mt-1">{it.note}</div>}
              {!it.resolved && (
                <div className="mt-2 space-y-2">
                  {it.suggestions.map((sug, j) => {
                    // backward compat: suggestions may be plain strings (older saved checks)
                    const sg = (typeof sug === 'string') ? { jp: sug } : sug;
                    const open = it.openSug === j;
                    return (
                      <div key={j} className={'border rounded-lg bg-white ' + (open ? 'border-terra-400' : 'border-terra-200')}>
                        <button onClick={() => setItem(idx, { openSug: open ? null : j })}
                          className="w-full text-left hover:bg-terra-100 rounded-lg px-3 py-1.5 text-sm flex justify-between items-center">
                          <span>{j + 1}. {sg.jp}</span>
                          <span className="text-xs text-gray-400">{open ? '▲' : '▼ example'}</span>
                        </button>
                        {open && (
                          <div className="px-3 pb-2">
                            {sg.example ? (
                              <div className="text-sm bg-terra-50 rounded-lg p-2 mb-2">
                                <div>{sg.example}</div>
                                {sg.exampleEn && <div className="text-xs text-gray-500 mt-1">{sg.exampleEn}</div>}
                              </div>
                            ) : (
                              <div className="text-xs text-gray-400 mb-2">(No example available — run "Check English" again to get examples.)</div>
                            )}
                            <button onClick={() => applyReplace(idx, sg.jp)}
                              className="bg-terra-500 hover:bg-terra-600 text-white text-sm font-bold px-4 py-1 rounded-lg">
                              Use this →
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                  <div className="flex gap-2 pt-1">
                    <input value={it.own}
                      onChange={e => setItem(idx, { own: e.target.value })}
                      className="flex-1 border rounded-lg px-3 py-1.5 text-sm" placeholder="Or type your own replacement..." />
                    <button onClick={() => it.own.trim() && applyReplace(idx, it.own.trim())}
                      className="bg-terra-400 hover:bg-terra-500 text-white text-sm font-bold px-4 rounded-lg">Use</button>
                    <button onClick={() => skip(idx)} className="text-xs text-gray-400 underline">Skip</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      {(st.englishItems.length > 0 || (st.englishChat || []).length > 0) && (
        <div className="mt-5">
          <div className="text-xs font-bold text-gray-500 mb-1">Questions about these words? Ask Torai-kun 🐯</div>
          <div ref={vListRef} className="relative border-2 border-terra-100 rounded-xl bg-terra-50/50 max-h-64 overflow-y-auto p-3 space-y-2">
            {(st.englishChat || []).length === 0 && (
              <div className="text-xs text-gray-400">Ask anything — nuance differences, how to use a word, or which suggestion fits your sentence best.</div>
            )}
            {(st.englishChat || []).map((m, i, arr) => (
              <div key={i} ref={i === arr.length - 1 ? vLastRef : null} className={'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start')}>
                <div className={
                  'max-w-[85%] rounded-2xl px-3 py-1.5 text-sm chat-md ' +
                  (m.role === 'user' ? 'bg-terra-500 text-white' : 'bg-white border border-terra-200')
                }>
                  {m.role === 'assistant' && <div className="text-xs font-bold text-terra-500 mb-0.5">🐯 Torai-kun</div>}
                  {renderChatText(m.text)}
                </div>
              </div>
            ))}
            {busy === 'vchat' && <div className="text-sm"><Spinner text="Torai-kun is typing..." /></div>}
          </div>
          <div className="mt-2 flex gap-2">
            <textarea value={vInput} onChange={e => setVInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && e.shiftKey && !e.nativeEvent.isComposing) { e.preventDefault(); sendVocab(); } }}
              rows={1} className="flex-1 border-2 border-gray-200 rounded-xl p-2 text-sm focus:border-terra-400 outline-none"
              placeholder="Ask about a word... (Shift+Enter to send)" />
            <button onClick={sendVocab} disabled={!!busy || !vInput.trim()}
              className="bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white text-sm font-bold px-4 rounded-xl">Send</button>
          </div>
        </div>
      )}

      <div className="mt-5 text-right">
        <button disabled={!!busy || !st.englishText.trim()}
          onClick={() => advance('english', st.englishText, 'deepl', { deeplText: st.englishText })}
          className="bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold px-6 py-2 rounded-lg">
          {busy === 'doc' ? 'Saving...' : 'Done — go to DeepL Check →'}
        </button>
      </div>
    </div>
  );
}

/* ---------- ③ DeepL Check ---------- */
function DeepLStep({ st, up, busy, setBusy, advance, auth, setError, persist }) {
  const [dInput, setDInput] = useState('');
  const dListRef = useRef(null);
  const dLastRef = useRef(null);

  // show the TOP of the newest message (so long replies start from the beginning)
  useEffect(() => {
    const c = dListRef.current, m = dLastRef.current;
    if (c && m) c.scrollTop = Math.max(0, m.offsetTop - 8);
  }, [(st.deeplChat || []).length]);

  const translate = async () => {
    setBusy('deepl'); setError('');
    try {
      const d = await api('deeplTranslate', { name: auth.name, pin: auth.pin, text: st.deeplText });
      up({ deeplEn: d.translation });
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  const sendDeepl = async () => {
    const t = dInput.trim();
    if (!t || busy) return;
    setDInput('');
    setBusy('dchat'); setError('');
    const history = [...(st.deeplChat || []), { role: 'user', text: t }];
    up({ deeplChat: history });
    try {
      const d = await api('deeplChat', {
        name: auth.name, pin: auth.pin, history,
        draft: st.deeplText, translation: st.deeplEn
      });
      const newChat = [...history, { role: 'assistant', text: d.text }];
      up({ deeplChat: newChat });
      persist(Object.assign({}, st, { deeplChat: newChat })).catch(() => {});
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  const docContent = st.deeplText +
    '\n\n----------------\nReflection 1 (optional)\n' +
    '- Parts that were hard to express:\n' + (st.ref1a || '(not filled in)') +
    '\n\n- What I struggled with:\n' + (st.ref1b || '(not filled in)');

  return (
    <div>
      <h3 className="font-bold mb-1">Compare with DeepL's English and revise your Japanese</h3>
      <p className="text-sm text-gray-500 mb-3">Check whether the English on the right matches what you meant. If not, revise the Japanese on the left and press "Translate" again. Repeat until you're satisfied.</p>
      <div className="grid sm:grid-cols-2 gap-4">
        <div>
          <div className="text-xs font-bold text-gray-500 mb-1">Your Japanese (editable)</div>
          <textarea value={st.deeplText} onChange={e => up({ deeplText: e.target.value })}
            rows={12} className="w-full border-2 border-gray-200 rounded-xl p-3 focus:border-terra-400 outline-none" />
        </div>
        <div>
          <div className="text-xs font-bold text-gray-500 mb-1">DeepL's English translation</div>
          <div className="w-full h-full max-h-80 min-h-[16rem] border-2 border-stone-200 bg-stone-50 rounded-xl p-3 text-sm whitespace-pre-wrap overflow-y-auto">
            {st.deeplEn || <span className="text-gray-400">Press "Translate" to see the English translation here</span>}
          </div>
        </div>
      </div>
      <div className="mt-3">
        <button onClick={translate} disabled={!!busy || !st.deeplText.trim()}
          className="bg-[#3D405B] hover:bg-[#2F3247] disabled:bg-gray-300 text-white font-bold px-5 py-2 rounded-lg">
          {busy === 'deepl' ? <Spinner text="Translating..." /> : '🔁 Translate'}
        </button>
      </div>

      <div className="mt-5">
        <div className="text-xs font-bold text-gray-500 mb-1">Questions? Ask Torai-kun 🐯</div>
        <div ref={dListRef} className="relative border-2 border-terra-100 rounded-xl bg-terra-50/50 max-h-64 overflow-y-auto p-3 space-y-2">
          {(st.deeplChat || []).length === 0 && (
            <div className="text-xs text-gray-400">Ask anything — why DeepL translated something a certain way, or how to fix your Japanese so it says what you mean.</div>
          )}
          {(st.deeplChat || []).map((m, i, arr) => (
            <div key={i} ref={i === arr.length - 1 ? dLastRef : null} className={'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start')}>
              <div className={
                'max-w-[85%] rounded-2xl px-3 py-1.5 text-sm chat-md ' +
                (m.role === 'user' ? 'bg-terra-500 text-white' : 'bg-white border border-terra-200')
              }>
                {m.role === 'assistant' && <div className="text-xs font-bold text-terra-500 mb-0.5">🐯 Torai-kun</div>}
                {renderChatText(m.text)}
              </div>
            </div>
          ))}
          {busy === 'dchat' && <div className="text-sm"><Spinner text="Torai-kun is typing..." /></div>}
        </div>
        <div className="mt-2 flex gap-2">
          <textarea value={dInput} onChange={e => setDInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && e.shiftKey && !e.nativeEvent.isComposing) { e.preventDefault(); sendDeepl(); } }}
            rows={1} className="flex-1 border-2 border-gray-200 rounded-xl p-2 text-sm focus:border-terra-400 outline-none"
            placeholder="Ask a question... (Shift+Enter to send)" />
          <button onClick={sendDeepl} disabled={!!busy || !dInput.trim()}
            className="bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white text-sm font-bold px-4 rounded-xl">Send</button>
        </div>
      </div>

      <div className="mt-6 border-t pt-4">
        <h4 className="font-bold text-sm mb-2">Reflection 1 <span className="font-normal text-gray-400">(optional)</span></h4>
        <label className="block text-xs text-gray-500 mb-1">Which parts were hard to express?</label>
        <textarea value={st.ref1a} onChange={e => up({ ref1a: e.target.value })} rows={2}
          className="w-full border rounded-lg p-2 text-sm mb-3" />
        <label className="block text-xs text-gray-500 mb-1">What did you struggle with?</label>
        <textarea value={st.ref1b} onChange={e => up({ ref1b: e.target.value })} rows={2}
          className="w-full border rounded-lg p-2 text-sm" />
      </div>

      <div className="mt-4 text-right">
        <button disabled={!!busy || !st.deeplText.trim() || !st.deeplEn}
          onClick={() => advance('deepl', docContent, 'chat', { chatDraft: st.deeplText })}
          className="bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold px-6 py-2 rounded-lg">
          {busy === 'doc' ? 'Saving...' : 'Done — go to Torai-kun Chat →'}
        </button>
        {!st.deeplEn &&
          <div className="text-xs text-gray-400 mt-1">* Check the English translation at least once before continuing</div>}
      </div>
    </div>
  );
}

/* ---------- ④ Torai-kun Chat (chat left / your draft right) ---------- */
function ChatStep({ st, up, busy, setBusy, advance, auth, dnum, setError, persist }) {
  const [input, setInput] = useState('');
  const listRef = useRef(null);
  const lastMsgRef = useRef(null);
  const startedRef = useRef(false);

  // show the TOP of the newest message (so long replies start from the beginning)
  useEffect(() => {
    const c = listRef.current, m = lastMsgRef.current;
    if (c && m) c.scrollTop = Math.max(0, m.offsetTop - 8);
  }, [st.chat.length]);

  // initialize the editable draft pane from the DeepL-checked text
  useEffect(() => {
    if (!st.chatDraft) up({ chatDraft: st.deeplText });
  }, []);

  // first visit: get Torai-kun's greeting
  useEffect(() => {
    if (st.chat.length === 0 && !startedRef.current) {
      startedRef.current = true;
      sendTurn(null);
    }
  }, []);

  const sendTurn = async (userText) => {
    setBusy('chat'); setError('');
    const history = userText != null
      ? [...st.chat, { role: 'user', text: userText }]
      : [...st.chat];
    if (userText != null) up({ chat: history });
    try {
      const d = await api('chatTurn', { name: auth.name, pin: auth.pin, history });
      const newChat = [...history, { role: 'assistant', text: d.text }];
      up({ chat: newChat });
      // auto-save after every turn (chat can get long); keep going even if it fails
      persist(Object.assign({}, st, { chat: newChat })).catch(() => {});
    } catch (e) { setError(e.message); }
    setBusy('');
  };

  const send = () => {
    const t = input.trim();
    if (!t || busy) return;
    setInput('');
    sendTurn(t);
  };

  const chatLog = st.chat.map(m =>
    (m.role === 'user' ? '[Student]' : '[Torai-kun]') + '\n' + m.text
  ).join('\n\n----------------\n\n');

  return (
    <div>
      <h3 className="font-bold mb-1">Get feedback from Torai-kun 🐯 — and revise your draft as you go</h3>
      <p className="text-sm text-gray-500 mb-3">Torai-kun reviews one sentence at a time (reply "next" when you have no questions). Edit your draft in the right pane while you chat — it will carry over to the Final Draft page.</p>

      <div className="grid lg:grid-cols-2 gap-4">
        {/* left: chat */}
        <div>
          <div className="text-xs font-bold text-gray-500 mb-1">Chat with Torai-kun</div>
          <div ref={listRef} className="relative border-2 border-terra-100 rounded-xl bg-terra-50/50 h-96 overflow-y-auto p-4 space-y-3">
            {st.chat.map((m, i, arr) => (
              <div key={i} ref={i === arr.length - 1 ? lastMsgRef : null} className={'flex ' + (m.role === 'user' ? 'justify-end' : 'justify-start')}>
                <div className={
                  'max-w-[85%] rounded-2xl px-4 py-2 text-sm chat-md ' +
                  (m.role === 'user' ? 'bg-terra-500 text-white' : 'bg-white border border-terra-200')
                }>
                  {m.role === 'assistant' && <div className="text-xs font-bold text-terra-500 mb-1">🐯 Torai-kun</div>}
                  {renderChatText(m.text)}
                </div>
              </div>
            ))}
            {busy === 'chat' && <div className="text-sm"><Spinner text="Torai-kun is typing..." /></div>}
          </div>
          <div className="mt-2 flex gap-2">
            <textarea value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && e.shiftKey && !e.nativeEvent.isComposing) { e.preventDefault(); send(); } }}
              rows={2} className="flex-1 border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-terra-400 outline-none"
              placeholder="Type a message (Shift+Enter to send)" />
            <button onClick={send} disabled={!!busy || !input.trim()}
              className="bg-terra-500 hover:bg-terra-600 disabled:bg-gray-300 text-white font-bold px-4 rounded-xl">Send</button>
          </div>
          <button onClick={() => setInput(st.chatDraft || st.deeplText)} className="mt-1 text-sm text-terra-600 underline">✏️ Paste my draft into the message box</button>
        </div>

        {/* right: editable draft */}
        <div>
          <div className="text-xs font-bold text-gray-500 mb-1">My draft (edit freely while you chat)</div>
          <textarea value={st.chatDraft} onChange={e => up({ chatDraft: e.target.value })}
            className="w-full h-96 border-2 border-gray-200 rounded-xl p-3 text-sm focus:border-terra-400 outline-none" />
          <div className="mt-2 text-right">
            <button disabled={!!busy || st.chat.length < 4}
              onClick={() => advance('chat', chatLog, 'final', { finalText: st.chatDraft || st.deeplText })}
              className="bg-terra-700 hover:bg-terra-800 disabled:bg-gray-300 text-white font-bold px-5 py-2 rounded-lg text-sm">
              {busy === 'doc' ? 'Saving...' : 'Finish corrections → Final Draft'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- ⑤ Final Draft ---------- */
function FinalStep({ st, up, busy, advance }) {
  const docContent = st.finalText +
    '\n\n----------------\nReflection 2 (optional)\n' +
    '- Parts that were hard to express:\n' + (st.ref2a || '(not filled in)') +
    '\n\n- What I struggled with:\n' + (st.ref2b || '(not filled in)');

  return (
    <div>
      <h3 className="font-bold mb-1">Write your final draft</h3>
      <p className="text-sm text-gray-500 mb-3">Rewrite it <b>in your own words</b>, keeping Torai-kun's feedback in mind. (It starts with the draft you revised on the chat page.)</p>
      <textarea value={st.finalText} onChange={e => up({ finalText: e.target.value })}
        rows={12} className="w-full border-2 border-gray-200 rounded-xl p-4 focus:border-terra-400 outline-none" />

      <div className="mt-5 border-t pt-4">
        <h4 className="font-bold text-sm mb-2">Reflection 2 <span className="font-normal text-gray-400">(optional)</span></h4>
        <label className="block text-xs text-gray-500 mb-1">Which parts were hard to express?</label>
        <textarea value={st.ref2a} onChange={e => up({ ref2a: e.target.value })} rows={2}
          className="w-full border rounded-lg p-2 text-sm mb-3" />
        <label className="block text-xs text-gray-500 mb-1">What did you struggle with?</label>
        <textarea value={st.ref2b} onChange={e => up({ ref2b: e.target.value })} rows={2}
          className="w-full border rounded-lg p-2 text-sm" />
      </div>

      <div className="mt-4 text-right">
        <button disabled={!!busy || !st.finalText.trim()}
          onClick={() => advance('final', docContent, 'done')}
          className="bg-green-600 hover:bg-green-700 disabled:bg-gray-300 text-white font-bold px-8 py-2 rounded-lg">
          {busy === 'doc' ? 'Submitting...' : '🎉 Submit'}
        </button>
      </div>
    </div>
  );
}

/* ---------- Done ---------- */
function DoneStep({ onExit, docLinks }) {
  return (
    <div className="text-center py-10">
      <div className="text-5xl mb-4">🎉</div>
      <h3 className="text-xl font-bold text-green-700 mb-2">Submitted!</h3>
      <p className="text-gray-500 text-sm mb-4">Great work! Your teacher has been notified by email.<br />You'll also get an email when your feedback is ready.</p>
      <div className="text-sm mb-6 space-x-4">
        {docLinks && docLinks.final &&
          <a href={docLinks.final} target="_blank" rel="noopener" className="text-terra-600 underline">📄 My final draft ↗</a>}
        {docLinks && docLinks.finalcopy &&
          <a href={docLinks.finalcopy} target="_blank" rel="noopener" className="text-terra-600 underline">📝 Teacher's feedback ↗</a>}
      </div>
      <button onClick={onExit} className="bg-terra-500 hover:bg-terra-600 text-white font-bold px-6 py-2 rounded-lg">Back to D# Menu</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
